name: careerguidancesystem
services:
  # ===== Discovery Service =====
  discovery-service:
    build: ./careerguidanceapp/discovery-service
    container_name: discovery-service
    environment:
      - TZ=${TIMEZONE}
    ports:
      - "${DISCOVERY_SERVICE_PORT}:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - micro-net

  # ===== PgAdmin =====
  pgadmin:
    image: ${PGADMIN_IMAGE}
    container_name: pgadmin-container
    environment:
      PGADMIN_DEFAULT_EMAIL: ${POSTGRES_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIMEZONE}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - micro-net
    depends_on:
      - postgres-user
      - postgres-academic
      - postgres-score
      - postgres-attendance

  # ===== API Gateway =====
  api-gateway:
    build: ./careerguidanceapp/api-gateway
    container_name: api-gateway
    environment:
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TZ: ${TIMEZONE}
    depends_on:
      discovery-service:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT}:8080"
    networks:
      - micro-net

  # ===== PostgreSQL Databases =====
  postgres-user:
    image: ${POSTGRES_IMAGE}
    container_name: postgres-user
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ./careerguidanceapp/user-service/init:/docker-entrypoint-initdb.d
      - postgres_user_data:/var/lib/postgresql/data
    ports:
      - "${USER_DB_PORT}:5432"
    networks:
      - micro-net

  postgres-academic:
    image: ${POSTGRES_IMAGE}
    container_name: postgres-academic
    environment:
      POSTGRES_DB: ${ACADEMIC_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ./careerguidanceapp/academic-service/init:/docker-entrypoint-initdb.d
      - postgres_academic_data:/var/lib/postgresql/data
    ports:
      - "${ACADEMIC_DB_PORT}:5432"
    networks:
      - micro-net

  postgres-score:
    image: ${POSTGRES_IMAGE}
    container_name: postgres-score
    environment:
      POSTGRES_DB: ${SCORE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ./careerguidanceapp/score-service/init:/docker-entrypoint-initdb.d
      - postgres_score_data:/var/lib/postgresql/data
    ports:
      - "${SCORE_DB_PORT}:5432"
    networks:
      - micro-net

  postgres-attendance:
    image: ${POSTGRES_IMAGE}
    container_name: postgres-attendance
    environment:
      POSTGRES_DB: ${ATTENDANCE_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TIMEZONE}
    volumes:
      - ./careerguidanceapp/attendance-service/init:/docker-entrypoint-initdb.d
      - postgres_attendance_data:/var/lib/postgresql/data
    ports:
      - "${ATTENDANCE_DB_PORT}:5432"
    networks:
      - micro-net

  # ===== Microservices =====
  user-service:
    build: ./careerguidanceapp/user-service
    container_name: user-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TIMEZONE}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      DB_URL: ${USER_DB_URL}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-user: { condition: service_started }
    ports:
      - "${USER_SERVICE_PORT}:8080"
    networks:
      - micro-net

  academic-service:
    build: ./careerguidanceapp/academic-service
    container_name: academic-service
    environment:
      TZ: ${TIMEZONE}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      DB_URL: ${ACADEMIC_DB_URL}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASS: ${MAIL_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-academic: { condition: service_started }
      redis: { condition: service_healthy }
    ports:
      - "${ACADEMIC_SERVICE_PORT}:8080"
    networks:
      - micro-net

  score-service:
    build: ./careerguidanceapp/score-service
    container_name: score-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TIMEZONE}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      DB_URL: ${SCORE_DB_URL}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASS: ${MAIL_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-score: { condition: service_started }
    ports:
      - "${SCORE_SERVICE_PORT}:8080"
    networks:
      - micro-net

  attendance-service:
    build: ./careerguidanceapp/attendance-service
    container_name: attendance-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TIMEZONE}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      DB_URL: ${ATTENDANCE_DB_URL}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASS: ${MAIL_PASSWORD}
      ADMIN_SERVICE_URL: ${ADMIN_SERVICE_URL}
      # MQTT mTLS Configuration
      MQTT_BROKER_URL: ${MQTT_BROKER_URL}
      MQTT_TLS_ENABLED: ${MQTT_TLS_ENABLED}
      MQTT_TRUSTSTORE_PATH: ${MQTT_TRUSTSTORE_PATH}
      MQTT_TRUSTSTORE_PASSWORD: ${MQTT_TRUSTSTORE_PASSWORD}
      MQTT_KEYSTORE_PATH: ${MQTT_KEYSTORE_PATH}
      MQTT_KEYSTORE_PASSWORD: ${MQTT_KEYSTORE_PASSWORD}
      MQTT_KEYSTORE_TYPE: ${MQTT_KEYSTORE_TYPE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    volumes:
      # Mount folder client certs cho Backend đọc file .p12 và .jks
      - ./careerguidanceapp/mosquitto/certs/client:/app/certs:ro
    depends_on:
      discovery-service: { condition: service_healthy }
      postgres-attendance: { condition: service_started }
      mosquitto: { condition: service_started }
    ports:
      - "${ATTENDANCE_SERVICE_PORT}:8080"
    networks:
      - micro-net

  mosquitto:
    image: ${MOSQUITTO_IMAGE}
    container_name: mosquitto
    restart: unless-stopped
    user: "1883:1883"
    ports:
      - "${MQTT_PORT}:1883"
      - "${MQTT_TLS_PORT}:8883"
      - "${MQTT_WS_PORT}:9001"
    volumes:
      - ./careerguidanceapp/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./careerguidanceapp/mosquitto/config/password.txt:/mosquitto/config/password.txt:ro
      - ./careerguidanceapp/mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=${TIMEZONE}
    networks:
      - micro-net
    healthcheck:
      # Kiểm tra cổng 8883 thay vì dùng lệnh sub vì vướng mTLS
      test: [ "CMD-SHELL", "netstat -an | grep 8883 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: ${REDIS_IMAGE}
    container_name: redis-container
    ports:
      - "${REDIS_PORT_EXTERNAL}:6379"
    environment:
      - TZ=${TIMEZONE}
    networks:
      - micro-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build: ./careerguidanceapp/chat-service
    container_name: chat-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: ${TIMEZONE}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64}
    depends_on:
      discovery-service: { condition: service_healthy }
    ports:
      - "${CHAT_SERVICE_PORT}:8080"
    networks:
      - micro-net

  admin-service:
    build: ./careerguidanceapp/admin-service
    container_name: admin-service
    environment:
      TZ: ${TIMEZONE}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_SERVER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
    depends_on:
      discovery-service: { condition: service_healthy }
    ports:
      - "${ADMIN_SERVICE_PORT}:8080"
    networks:
      - micro-net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    command: [ "--quiet", "--logpath", "/var/log/mongodb/mongod.log", "--logappend" ]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      TZ: ${TIMEZONE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - micro-net
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Giao diện quản lý MongoDB (Tùy chọn - giống PgAdmin)
  mongo-express:
    image: mongo-express
    container_name: mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_ROOT_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_EXPRESS_PORT}:8081"
    depends_on:
      - mongodb
    networks:
      - micro-net

  # ===== New Python Model Service =====
  careerguidance-model:
    build: ./careerguidancemodel
    container_name: careerguidance-model
    ports:
      - "8000:8000"
    env_file:
      - ./careerguidancemodel/.env
    networks:
      - micro-net

  # ===== New Next.js Web Service =====
  careerguidance-web:
    build: ./careerguidanceweb
    container_name: careerguidance-web
    ports:
      - "3000:3000"
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge

volumes:
  pgadmin_data:
  postgres_user_data:
  postgres_academic_data:
  postgres_score_data:
  postgres_attendance_data:
  mosquitto_data:
  mosquitto_log:
  mongodb_data:


