# ==============================================================
# TEST PROFILE — Được load tự động khi chạy test.
# ==============================================================

# ---- Tắt Eureka (không cần discovery trong test) ----
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ---- Tắt Circuit Breaker (đơn giản hoá môi trường test) ----
spring.cloud.openfeign.circuitbreaker.enabled=false

# ---- Mail: dùng giá trị placeholder để Spring context load thành công ----
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test

# ---- JPA: dùng create-drop để mỗi lần test DB được tạo mới và xoá sạch ----
spring.jpa.hibernate.ddl-auto=create-drop

# ---- RabbitMQ ----
RABBITMQ_HOST=localhost
RABBITMQ_PORT=5672
RABBITMQ_USERNAME=guest
RABBITMQ_PASSWORD=guest

# ---- Các placeholder DB ----
DB_URL=jdbc:postgresql://localhost:5432/testdb
DB_USERNAME=test
DB_PASS=test

# ---- Redis ----
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=
