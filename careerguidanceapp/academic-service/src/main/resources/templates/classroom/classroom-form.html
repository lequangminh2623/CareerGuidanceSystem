<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
    <head>
        <title>Lớp học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
    <p th:replace="~{base :: header}"></p>
    <main class="flex-grow-1 container mt-5">
        <div class="row g-3">
            <h2 class="col-md-10" th:text="${classroom.id == null ? 'Thêm lớp học' : 'Cập nhật lớp học'}"></h2>
            <div class="col-md-2">
                <a th:href="@{/classrooms}" class="btn btn-secondary">⬅️ Quay lại</a>
            </div>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>
        <form id="classroomForm" method="post" th:action="@{/classrooms}" th:object="${classroom}" class="row g-3">
            <input type="hidden" th:field="*{id}" />

            <div class="row g-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">Tên lớp:</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="col-md-6">
                    <label for="gradeSelect" class="form-label">Khối lớp:</label>
                    <select th:field="*{gradeId}" id="gradeSelect" class="form-select"
                            th:classappend="${#fields.hasErrors('gradeId')} ? 'is-invalid'">
                        <option th:each="g : ${grades}"
                                th:value="${g.id}"
                                th:text="${g.yearName + ' - ' + g.name}">
                        </option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{gradeId}"></div>
                </div>

                <div class="col-md-12">
                    <label for="studentSelect" class="form-label">Thêm sinh viên:</label>
                    <select id="studentSelect" multiple class="form-select" th:field="*{studentIds}"
                            th:classappend="${#fields.hasErrors('studentIds')} ? 'is-invalid'">
                        <option th:each="s : ${students}" 
                                th:value="${s.id}" 
                                th:text="${s.code + ' - ' + s.lastName + ' ' + s.firstName}">
                        </option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{studentIds}"></div>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary m-1">💾 Lưu lớp học</button>
            </div>
        </form>
        <div class="col-12 mt-4" th:if="${classroom.id != null}">
            <h3>Danh sách lớp học</h3>
            <table class="table table-striped table-bordered">
                <thead class="table-light">
                    <tr>
                        <th class="text-center align-middle" rowspan="2">MSSV</th>
                        <th class="text-center align-middle" rowspan="2">Họ và tên đệm</th>
                        <th class="text-center align-middle" rowspan="2">Tên</th>
                        <th class="text-center align-middle" rowspan="2">Hành động</th>
                    </tr>
                </thead>

                <tbody id="student-table-body">
                <tr th:each="s : ${students}" th:if="${classroom.studentIds.contains(s.id)}">
                    <td class="text-center align-middle" th:text="${s.code}"></td>
                    <td class="text-center align-middle" th:text="${s.lastName}"></td>
                    <td class="text-center align-middle" th:text="${s.firstName}"></td>
                    <td class="text-center align-middle">
                        <button class="btn btn-danger"
                                th:data-url="@{/classrooms/}"
                                th:data-classroom-id="${classroom.id}"
                                th:data-student-id="${s.id}"
                                onclick="removeStudentFromClassroom(this)">
                            🗑️
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
    <p th:replace="~{base :: footer}"></p>
    <script th:src="@{/js/classroom.js}"></script>

</body>
</html>
