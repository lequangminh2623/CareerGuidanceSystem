# ==============================================================
# TEST PROFILE — Được load tự động khi chạy test.
# Các giá trị ở đây sẽ OVERRIDE application.properties.
# Các giá trị kết nối động (DB, RabbitMQ, Redis) sẽ được
# ghi đè tiếp bởi @DynamicPropertySource trong BaseIntegrationTest.
# ==============================================================

# ---- Tắt Eureka (không cần discovery trong test) ----
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ---- Tắt Circuit Breaker (đơn giản hoá môi trường test) ----
spring.cloud.openfeign.circuitbreaker.enabled=false

# ---- Mail: dùng giá trị placeholder để Spring context load thành công ----
# Các giá trị thực sẽ được override bởi @DynamicPropertySource
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test

# ---- JPA: dùng create-drop để mỗi lần test DB được tạo mới và xoá sạch ----
spring.jpa.hibernate.ddl-auto=create-drop

# profile "test" được kích hoạt bởi @ActiveProfiles trong BaseIntegrationTest
# Không được khai báo spring.profiles.active ở đây (Spring Boot 4.0 cấm trong profile-specific file)
