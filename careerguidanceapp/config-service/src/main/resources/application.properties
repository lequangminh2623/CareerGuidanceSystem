spring.application.name=config-service
# config-service/src/main/resources/application.properties

server.port=8888

spring.cloud.config.server.native.search-locations=file:./config-repo

# Eureka
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ==== Profiles & Logging ====

spring.profiles.active=native,git
spring.cloud.config.server.git.uri=https://github.com/lequangminh2623/CareerGuidanceSystem.git
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.search-paths=user-service,academic-service
spring.cloud.config.server.git.clone-on-start=true
