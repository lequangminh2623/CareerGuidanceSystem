# ==============================================================
# TEST PROFILE — Được load tự động khi chạy test (@ActiveProfiles("test")).
# Các giá trị ở đây OVERRIDE application.properties để Spring
# ApplicationContext khởi động thành công trong môi trường test.
# ==============================================================

# ---- Tắt Eureka (không cần service discovery trong test) ----
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ---- Tắt Circuit Breaker / Feign CB (đơn giản hóa môi trường test) ----
spring.cloud.openfeign.circuitbreaker.enabled=false

# ---- Tắt profile prod, kích hoạt test ----
# (Không đặt spring.profiles.active ở đây — được set bởi @ActiveProfiles trong test class)

# ---- JPA: create-drop để mỗi lần test DB được tạo mới và xoá sạch ----
spring.jpa.hibernate.ddl-auto=create-drop

# ---- Các placeholder từ biến môi trường — cung cấp giá trị giả để context load ----
# DB (sẽ bị override bởi @ServiceConnection / Testcontainers)
DB_URL=jdbc:postgresql://localhost:5432/testdb
DB_USERNAME=test
DB_PASS=test
spring.datasource.hikari.maximum-pool-size=2

# JWT
JWT_SECRET=test-secret-key-for-unit-tests-only-not-used-in-prod
JWT_EXPIRATION_MS=86400000

# Cloudinary (không dùng trong unit test)
CLOUDINARY_CLOUD_NAME=test-cloud
CLOUDINARY_API_KEY=test-api-key
CLOUDINARY_API_SECRET=test-api-secret

# Google OAuth2 (không gọi thực sự trong unit test — GoogleIdTokenVerifier được mock)
GOOGLE_CLIENT_ID=test-google-client-id.apps.googleusercontent.com
GOOGLE_CLIENT_SECRET=test-google-client-secret

# Redis (tắt autoconfiguration, không dùng trong WebMvcTest slice)
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=

# Eureka URL (không dùng vì eureka.client.enabled=false)
EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://localhost:8761/eureka/
