<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Thêm/Cập nhật người dùng</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
</head>
<body class="d-flex flex-column min-vh-100">
<p th:replace="~{base :: header}"></p>
<main class="flex-grow-1 container mt-5">
    <h2 class="text-center text-primary mb-4"
        th:text="${user.id == null ? 'Thêm người dùng mới' : 'Cập nhật người dùng'}">
    </h2>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}"></span>
    </div>
    <form method="post"
          th:action="@{/users/save}"
          th:object="${user}"
          enctype="multipart/form-data"
          class="row g-3 needs-validation">

        <div class="col-md-6">
            <label for="lastName" class="form-label">Họ:</label>
            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" placeholder="Nguyễn"
                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{lastName}"></div>
        </div>

        <div class="col-md-6">
            <label for="firstName" class="form-label">Tên:</label>
            <input type="text" class="form-control" id="firstName" th:field="*{firstName}" placeholder="Văn A"
                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{firstName}"></div>
        </div>

        <div class="col-md-6">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="example@ou.edu.vn" pattern="^[A-Za-z0-9._%+\-]+@ou.edu.vn$"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{email}"></div>
        </div>

        <div class="col-md-6">
            <label for="role" class="form-label">Vai trò:</label>
            <select class="form-select" id="role" th:field="*{role}" required>
                <option value="Student">Sinh viên</option>
                <option value="Admin">Quản trị viên</option>
                <option value="Teacher">Giáo viên</option>
            </select>
        </div>

        <div class="col-md-6">
            <label for="gender" class="form-label">Giới tính</label>
            <select id="gender" th:field="*{gender}" class="form-select">
                <option th:value="true" selected>Nam</option>
                <option th:value="false">Nữ</option>
            </select>
        </div>

        <div class="col-md-6" id="codeGroup" style="display: none">
            <label for="code" class="form-label">Mã số sinh viên:</label>
            <input type="text" class="form-control" id="code"
                   th:field="*{code}" placeholder="0123456789"
                   maxlength="10" minlength="10" inputmode="numeric" required
                   th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{code}"></div>
        </div>

        <div class="row mb-3 align-items-start">
            <div class="col-md-10">
                <label class="form-label">Ảnh đại diện:</label>
                <div class="d-flex align-items-center">
                    <input type="file" class="form-control" th:name="file" />
                </div>

                <img th:if="${user.avatar != null}"
                     th:src="${user.avatar}"
                     class="img-thumbnail mt-2"
                     style="max-width: 150px;"  alt="avatar"/>
            </div>

            <div class="col-md-2">
                <div class="form-check pt-4"> <input class="form-check-input" type="checkbox" id="active" checked th:field="*{active}" />
                    <label class="form-check-label" for="active">Hoạt động</label>
                </div>
            </div>
        </div>

        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{avatar}" />
        <input type="hidden" th:field="*{createdDate}" />

        <div class="col-12">
            <button type="submit" class="btn btn-success">
                <span th:if="${user.id == null}">➕ Thêm người dùng</span>
                <span th:unless="${user.id == null}">💾 Cập nhật người dùng</span>
            </button>
        </div>
    </form>
</main>
<p th:replace="~{base :: footer}"></p>
<script th:src="@{/js/user.js}"></script>
</body>
</html>
