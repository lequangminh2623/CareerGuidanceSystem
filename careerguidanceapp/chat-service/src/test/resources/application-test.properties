eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Firebase — placeholder giả để bypass FirebaseConfig (thực tế bị ghi đè bởi FirebaseTestConfig @MockBean)
firebase.service-account.base64=PLACEHOLDER_FOR_TESTS

# RabbitMQ — được override bởi Testcontainers qua @DynamicPropertySource
