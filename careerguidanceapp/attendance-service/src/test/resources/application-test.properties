# ==============================================================
# TEST PROFILE — Được load tự động khi chạy test.
# ==============================================================

# ---- Tắt Eureka (không cần discovery trong test) ----
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ---- Tắt Circuit Breaker ----
spring.cloud.openfeign.circuitbreaker.enabled=false

# ---- JPA: dùng create-drop ----
spring.jpa.hibernate.ddl-auto=create-drop

# ---- Các placeholder DB ----
DB_URL=jdbc:postgresql://localhost:5432/testdb
DB_USERNAME=test
DB_PASS=test

# ---- JWT ----
jwt.secret=my-super-secret-key-for-testing-only-1234567890
jwt.expiration-ms=3600000

# ---- MQTT ----
mqtt.broker.url=tcp://localhost:1883
mqtt.tls.enabled=false
mqtt.tls.truststore.path=
mqtt.tls.truststore.password=
mqtt.tls.keystore.path=
mqtt.tls.keystore.password=
mqtt.tls.keystore.type=

# ---- Internal Services ----
admin.service.url=http://localhost:8080

# ---- RabbitMQ ----
RABBITMQ_PORT=5672
RABBITMQ_HOST=localhost
RABBITMQ_USERNAME=guest
RABBITMQ_PASSWORD=guest
