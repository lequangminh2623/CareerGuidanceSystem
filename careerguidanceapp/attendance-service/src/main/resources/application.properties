spring.application.name=attendance-service
logging.level.com.lqm=DEBUG

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASS}
server.port=8080
debug=true

# ==== Hibernate ====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==== MQTT - Secure mTLS Configuration ====
mqtt.broker.url=${MQTT_BROKER_URL}

# Enable/Disable TLS (true by default)
mqtt.tls.enabled=${MQTT_TLS_ENABLED}

# Truststore configuration (for server certificate verification)
mqtt.tls.truststore.path=${MQTT_TRUSTSTORE_PATH}
mqtt.tls.truststore.password=${MQTT_TRUSTSTORE_PASSWORD}

# Keystore configuration (for client certificate - mTLS)
mqtt.tls.keystore.path=${MQTT_KEYSTORE_PATH}
mqtt.tls.keystore.password=${MQTT_KEYSTORE_PASSWORD}
mqtt.tls.keystore.type=${MQTT_KEYSTORE_TYPE}

# ==== Redis ====
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# ==== Profiles & Logging ====
spring.profiles.active=prod

# ==== Internal Service Callbacks ====
admin.service.url=${ADMIN_SERVICE_URL}

# ==== JWT for Internal Calls ====
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}