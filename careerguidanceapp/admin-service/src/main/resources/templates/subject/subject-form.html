<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title th:text="${subject.id == null ? 'Thêm môn học mới' : 'Cập nhật môn học'}"></title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="mb-4">
                <a th:href="@{/subjects}" class="text-decoration-none text-muted small mb-2 d-inline-block">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại danh sách
                </a>
                <h3 class="fw-bold text-dark"
                    th:text="${subject.id == null ? 'Thêm Môn học mới' : 'Cập nhật Môn học'}"></h3>
            </div>

            <form method="post" th:action="@{/subjects}" th:object="${subject}"
                  class="form-card needs-validation" novalidate>

                <div class="form-body">

                    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-4 p-2 small"
                         role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Tên môn học <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"
                                  th:classappend="${#fields.hasErrors('name')} ? 'border-danger text-danger bg-white'">
                                <i class="fas fa-book"></i>
                            </span>

                            <input type="text" class="form-control border-start-0 ps-2" id="name" th:field="*{name}"
                                   placeholder="Ví dụ: Math, English..." autocomplete="off"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>

                            <div class="invalid-feedback ms-2" th:errors="*{name}"></div>
                        </div>
                        <div class="helper-box">
                            <div class="d-flex">
                                <i class="fas fa-info-circle text-primary me-2 mt-1"></i>
                                <div>
                                    <strong>Lưu ý định dạng:</strong>
                                    <div class="mt-1">Tên môn học theo đúng chương trình đào tạo.</div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="form-footer">
                    <input type="hidden" th:field="*{id}"/>

                    <a th:href="@{/subjects}" class="btn btn-light text-muted border me-2">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">
                        <i class="fas fa-save me-1"></i> Lưu lại
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<p th:replace="~{base :: footer}"></p>

</body>
</html>
