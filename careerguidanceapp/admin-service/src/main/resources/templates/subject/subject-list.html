<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Quản lý Môn học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}"/>
    <link rel="stylesheet" th:href="@{/css/subject/subject-list.css}"/>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">

    <div class="page-header mb-4">
        <div>
            <h4 class="fw-bold mb-1">Quản lý Môn học</h4>
            <span class="text-muted small">Danh sách các môn học trong hệ thống</span>
        </div>
    </div>

    <div class="filter-bar d-flex justify-content-between align-items-center mb-3">
        <form th:action="@{/subjects}" method="get" class="d-flex align-items-center flex-grow-1 me-3">
            <div class="input-group" style="max-width: 400px;">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-search"></i></span>
                <input type="text" name="kw" class="form-control border-start-0 ps-0"
                       placeholder="Tìm kiếm môn học..."
                       th:value="${params['kw']}"/>
                <button type="submit" class="btn btn-outline-primary border-start-0" style="border-color: #d9d9d9; color: #1890FF;">
                    Lọc
                </button>
            </div>
        </form>

        <a th:href="@{/subjects/add}" class="btn btn-primary shadow-sm px-3">
            <i class="fas fa-plus me-2"></i> Thêm môn học
        </a>
    </div>

    <div class="card table-card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th class="ps-4 text-start">Tên môn học</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${subjects.content}">
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <div class="subject-icon">
                                <i class="fas fa-book-open"></i>
                            </div>
                            <span class="subject-name fw-bold text-dark" th:text="${s.name}">Toán học</span>
                        </div>
                    </td>

                    <td class="text-end pe-4">
                        <a th:href="@{'/subjects/' + ${s.id}}" class="btn-icon" title="Chỉnh sửa">
                            <i class="fas fa-pen" style="font-size: 14px;"></i>
                        </a>
                        <button class="btn-icon delete"
                                th:data-url="@{/subjects/}"
                                th:data-id="${s.id}"
                                onclick="deleteHandler(this)"
                                title="Xóa">
                            <i class="fas fa-trash" style="font-size: 14px;"></i>
                        </button>
                    </td>
                </tr>

                <tr th:if="${subjects.totalElements == 0}">
                    <td colspan="2" class="text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-book-reader mb-3" style="font-size: 24px; opacity: 0.5;"></i>
                            <p class="mb-0">Không tìm thấy môn học nào.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/pagination :: pagination(pageData=${subjects})}"></div>

    </div>

</main>

<p th:replace="~{base :: footer}"></p>
<script th:src="@{/js/delete.js}"></script>

</body>
</html>
