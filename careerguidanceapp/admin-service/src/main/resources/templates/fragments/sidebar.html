<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="grade-sidebar(baseUrl)" class="sidebar-card h-100">
    <div class="sidebar-header">
        <i class="fas fa-layer-group me-2 text-primary"></i> Danh sách Khối lớp
    </div>

    <div class="p-2">
        <div class="accordion" id="gradeAccordion" th:if="${not #maps.isEmpty(groupedGrades)}">
            <div class="accordion-item border-0 mb-1" th:each="entry, iterStat : ${groupedGrades}">
                <th:block th:with="isExpanded=${(params['gradeId'] == null && iterStat.index == 0) || (params['gradeId'] != null && #lists.contains(entry.value.![id.toString()], params['gradeId']))}">
                    <h2 class="accordion-header" th:id="'heading' + ${iterStat.index}">
                        <button class="accordion-button rounded-2"
                                th:classappend="${!isExpanded} ? 'collapsed'"
                                type="button" data-bs-toggle="collapse"
                                th:data-bs-target="'#collapse' + ${iterStat.index}">
                            <i class="far fa-calendar-alt me-2 opacity-50"></i>
                            <span th:text="${entry.key}">2025-2026</span>
                        </button>
                    </h2>
                    <div th:id="'collapse' + ${iterStat.index}" class="accordion-collapse collapse" th:classappend="${isExpanded} ? 'show'">
                        <div class="accordion-body p-0 py-1">
                            <div class="list-group list-group-flush">
                                <a th:each="g : ${entry.value}" th:href="@{${baseUrl}(gradeId=${g.id})}"
                                   class="grade-menu-item" th:classappend="${params['gradeId'] == g.id.toString()} ? 'active'">
                                    <span th:text="${g.name}">Khối 10</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>

        <div th:if="${#maps.isEmpty(groupedGrades)}" class="text-center py-4 text-muted">
            <i class="fas fa-folder-open d-block mb-2 opacity-25" style="font-size: 2rem;"></i>
            <small>Chưa có khối lớp nào</small>
        </div>
    </div>
</div></body>
</html>
