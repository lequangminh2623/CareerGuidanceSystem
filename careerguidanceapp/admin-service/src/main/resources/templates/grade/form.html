<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <title th:text="${grade.id == null ? 'Thêm khối lớp mới' : 'Cập nhật khối lớp'}"></title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>

<body class="d-flex flex-column min-vh-100">

    <p th:replace="~{base :: header}"></p>

    <main class="flex-grow-1 container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="mb-4">
                    <nav aria-label="breadcrumb" class="mb-2 text-muted small fw-bold">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-muted">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/years/{id}/grades(id=${yearDisplay.id})}" class="text-decoration-none text-muted">Khối lớp</a></li>
                            <li class="breadcrumb-item active text-primary" aria-current="page" th:text="${grade.id == null ? 'Thêm mới' : 'Cập nhật'}">Thêm mới</li>
                        </ol>
                    </nav>
                    <h2 class="fw-black text-dark tracking-tight mb-1" th:text="${grade.id == null ? 'Thêm Khối lớp mới' : 'Cập nhật Khối lớp'}"></h2>
                </div>

                <form method="post" th:action="@{/grades}" th:object="${grade}" class="form-card border-0 shadow-sm rounded-xl overflow-hidden needs-validation" novalidate>
                    <div class="form-body p-4 p-lg-5">
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-xl border-0 shadow-sm mb-4" role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i><span class="fw-bold" th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="mb-5 pb-4 border-bottom border-indigo-soft">
                            <label class="form-label text-muted small text-uppercase fw-black tracking-widest mb-3">Niên khóa trực thuộc</label>
                            <div class="d-flex align-items-center bg-indigo-soft p-3 rounded-xl">
                                <div class="bg-white p-2 rounded-3 me-3 text-indigo">
                                    <i class="far fa-calendar-alt fs-5"></i>
                                </div>
                                <span class="fw-black fs-5 text-indigo" th:text="${yearDisplay.name}">2024-2025</span>
                            </div>
                        </div>

                        <div class="mb-2">
                            <label for="name" class="form-label fw-bold text-dark">Tên khối lớp học <span class="text-danger">*</span></label>
                            <div class="input-group input-group-merge">
                                <span class="input-group-text bg-light border-0 px-3 text-muted">
                                    <i class="fas fa-shapes"></i>
                                </span>
                                <select class="form-select bg-light border-0 ps-0 py-2.5 fs-15 fw-bold" id="name" th:field="*{name}"
                                    th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                                    <option value="" disabled selected>-- Chọn định danh khối --</option>
                                    <option value="Grade 10">Khối 10 (Grade 10)</option>
                                    <option value="Grade 11">Khối 11 (Grade 11)</option>
                                    <option value="Grade 12">Khối 12 (Grade 12)</option>
                                </select>
                                <div class="invalid-feedback fw-bold mt-2" th:errors="*{name}"></div>
                            </div>
                        </div>
                    </div>

                    <div class="form-footer bg-light p-4 p-lg-5 border-top d-flex justify-content-end gap-3 rounded-bottom-xl">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:field="*{yearId}" />
                        <a th:href="@{/years/{id}/grades(id=${yearDisplay.id})}" class="btn btn-white border px-4 py-2.5 rounded-xl fw-bold text-muted hover-translate-y">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary px-5 py-2.5 rounded-xl fw-black shadow-primary hover-translate-y">
                            <i class="fas fa-save me-2 opacity-50"></i> Lưu lại
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <p th:replace="~{base :: footer}"></p>

</body>

</html>
