<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Quản lý Khối lớp</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}"/>
    <link rel="stylesheet" th:href="@{/css/grade/grade-list.css}"/>
</head>

<body class="d-flex flex-column min-vh-100">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">

    <div class="page-header">
        <div>
            <div class="d-flex align-items-center mb-1">
                <h4 class="fw-bold mb-0">Quản lý Khối lớp</h4>
                <span class="parent-year-tag">
                    <i class="far fa-calendar-alt me-1"></i>
                    <span th:text="${yearDisplay.name}">2024-2025</span>
                </span>
            </div>
            <span class="text-muted small">Danh sách các khối lớp thuộc niên khóa này</span>
        </div>

        <a th:href="@{/years}" class="btn btn-light border text-muted shadow-sm">
            <i class="fas fa-arrow-left me-2"></i>Quay lại Năm học
        </a>
    </div>

    <div class="filter-bar">
        <form th:action="@{/years/{id}/grades(id=${yearDisplay.id})}" method="get" class="d-flex align-items-center flex-grow-1 me-3">
            <div class="input-group" style="max-width: 400px;">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-search"></i></span>
                <input type="text" name="kw" class="form-control border-start-0 ps-0"
                       placeholder="Tìm kiếm khối lớp..."
                       th:value="${params['kw']}"/>
                <button type="submit" class="btn btn-outline-primary border-start-0" style="border-color: #d9d9d9">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </form>

        <a th:href="@{/years/{id}/grades/add(id=${yearDisplay.id})}" class="btn btn-primary shadow-sm px-3">
            <i class="fas fa-plus me-2"></i>Thêm khối lớp
        </a>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th class="ps-4 text-start">Tên Khối lớp</th>
                    <th>Năm học trực thuộc</th>
                    <th class="text-end pe-4">Thao tác</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="g : ${gradeDisplays}">
                    <td class="ps-4">
                        <span class="grade-badge">
                            <i class="fas fa-layer-group me-2"></i>
                            <span th:text="${g.name}">Khối 10</span>
                        </span>
                    </td>

                    <td>
                        <span class="text-muted small">
                            Thuộc: <strong th:text="${yearDisplay.name}"></strong>
                        </span>
                    </td>

                    <td class="text-end pe-4">
                        <a th:href="@{/grades/{gradeId}(gradeId=${g.id})}"
                           class="btn-icon" title="Chỉnh sửa">
                            <i class="fas fa-pen" style="font-size: 14px;"></i>
                        </a>
                        <button class="btn-icon delete"
                                th:data-url="@{/grades/}"
                                th:data-id="${g.id}"
                                onclick="deleteHandler(this)"
                                title="Xóa">
                            <i class="fas fa-trash" style="font-size: 14px;"></i>
                        </button>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(gradeDisplays)}">
                    <td colspan="3" class="text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-cubes mb-3" style="font-size: 24px; opacity: 0.5;"></i>
                            <p class="mb-0">Chưa có khối lớp nào được tạo cho năm học này.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<p th:replace="~{base :: footer}"></p>
<script th:src="@{/js/delete.js}"></script>

</body>
</html>
