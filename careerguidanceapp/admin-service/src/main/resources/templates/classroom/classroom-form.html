<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title th:text="${classroom.id == null ? 'Thêm lớp học' : 'Cập nhật lớp học'}">Lớp học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}"/>
    <link rel="stylesheet" th:href="@{/css/classroom/classroom-form.css}"/>
    <link rel="stylesheet" th:href="@{/css/sidebar.css}"/>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">
    <div class="row g-4">

        <div class="col-lg-3 col-md-4">
            <div th:replace="~{fragments/sidebar :: grade-sidebar(baseUrl='/classrooms')}"></div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="card form-card">
                <div class="form-header">
                    <h5 class="form-title">
                        <i class="fas fa-chalkboard-teacher me-2 text-primary"></i>
                        <span th:text="${classroom.id == null ? 'Thêm mới lớp học' : 'Cập nhật lớp học'}"></span>
                    </h5>
                    <a th:href="@{/classrooms(gradeId=${params['gradeId']})}" class="btn btn-light border btn-sm">
                        <i class="fas fa-times me-1"></i> Đóng
                    </a>
                </div>

                <div class="card-body p-4">
                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                    </div>

                    <form id="classroomForm" method="post" th:action="@{/classrooms(gradeId=${params['gradeId']})}"
                          th:object="${classroom}">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" name="gradeId" th:value="${params['gradeId']}"/>

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Tên lớp học <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"
                                          th:classappend="${#fields.hasErrors('name')} ? 'border-danger text-danger bg-white'">
                                        <i class="fas fa-chalkboard-teacher"></i>
                                    </span>
                                    <input type="text" class="form-control" th:field="*{name}"
                                           placeholder="Ví dụ: 10A1..."
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
                                    <div class="invalid-feedback" th:errors="*{name}"></div>
                                </div>
                            </div>

                            <div class="col-md-12 mt-4">
                                <label class="form-label fw-bold"><i class="fas fa-users-cog me-2 text-primary"></i>Phân
                                    công sinh viên vào lớp</label>

                                <div class="row align-items-center dual-listbox-container p-3 border rounded bg-light">

                                    <div class="col-md-5">
                                        <label class="form-label small text-muted">Danh sách tìm kiếm</label>
                                        <div class="input-group input-group-sm mb-2">
                                            <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                                            <input type="text" id="searchAvailable" class="form-control"
                                                   placeholder="Gõ tên hoặc mã học sinh để tìm...">
                                        </div>
                                        <select id="listAvailable" multiple
                                                class="form-select custom-select-box"></select>
                                        <div class="small text-muted mt-1" id="loadingText" style="display: none;">
                                            <i class="fas fa-spinner fa-spin me-1"></i> Đang tìm kiếm...
                                        </div>
                                    </div>

                                    <div class="col-md-2 d-flex flex-column align-items-center justify-content-center gap-2">
                                        <button type="button" id="btnMoveRight"
                                                class="btn btn-outline-primary btn-sm w-75 shadow-sm"
                                                title="Chuyển mục đã chọn sang phải">
                                            <i class="fas fa-angle-right"></i>
                                        </button>
                                        <button type="button" id="btnMoveAllRight"
                                                class="btn btn-outline-primary btn-sm w-75 shadow-sm"
                                                title="Chuyển tất cả sang phải">
                                            <i class="fas fa-angle-double-right"></i>
                                        </button>
                                        <button type="button" id="btnMoveLeft"
                                                class="btn btn-outline-danger btn-sm w-75 shadow-sm mt-3"
                                                title="Xóa mục đã chọn khỏi lớp">
                                            <i class="fas fa-angle-left"></i>
                                        </button>
                                        <button type="button" id="btnMoveAllLeft"
                                                class="btn btn-outline-danger btn-sm w-75 shadow-sm"
                                                title="Xóa tất cả khỏi lớp">
                                            <i class="fas fa-angle-double-left"></i>
                                        </button>
                                    </div>

                                    <div class="col-md-5">
                                        <label class="form-label small fw-bold text-success">
                                            Học sinh trong lớp (<span id="selectedCount">0</span>)
                                        </label>
                                        <div class="input-group input-group-sm mb-2">
                                            <span class="input-group-text bg-white"><i class="fas fa-filter"></i></span>
                                            <input type="text" id="filterSelected" class="form-control"
                                                   placeholder="Lọc trong danh sách đã chọn...">
                                        </div>

                                        <select id="studentIds" multiple
                                                class="form-select custom-select-box border-success"
                                                name="studentIds"
                                                th:classappend="${#fields.hasErrors('studentIds')} ? 'is-invalid'">
                                            <th:block th:if="${selectedStudents != null}">
                                                <option th:each="s : ${selectedStudents}"
                                                        th:value="${s.id}"
                                                        th:text="${s.code + ' - ' + s.lastName + ' ' + s.firstName}">
                                                </option>
                                            </th:block>
                                        </select>
                                        <div class="invalid-feedback" th:errors="*{studentIds}"></div>
                                    </div>

                                </div>
                            </div>

                            <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                                <a th:href="@{/classrooms(gradeId=${params['gradeId']})}" class="btn btn-light border">Hủy
                                    bỏ</a>
                                <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                    <i class="fas fa-save me-2"></i> Lưu lớp học
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<p th:replace="~{base :: footer}"></p>
<script th:src="@{/js/classroom/classroom.js}"></script>
</body>
</html>
