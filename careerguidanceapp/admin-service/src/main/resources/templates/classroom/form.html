<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <title th:text="${classroom.id == null ? 'Thêm lớp học' : 'Cập nhật lớp học'}">Lớp học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}" />
    <link rel="stylesheet" th:href="@{/css/classroom/classroom-form.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <p th:replace="~{base :: header}"></p>
    <main class="grow container py-5">
        <div class="row g-4">
            <div class="col-lg-3 col-md-4">
                <div th:replace="~{fragments/sidebar :: grade-sidebar(baseUrl='/classrooms')}"></div>
            </div>
            <div class="col-lg-9 col-md-8">
                <div class="page-header mb-4">
                    <div>
                        <nav aria-label="breadcrumb" class="mb-2 text-muted small fw-bold">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a th:href="@{/}"
                                        class="text-decoration-none text-muted">Dashboard</a></li>
                                <li class="breadcrumb-item"><a th:href="@{/classrooms(gradeId=${params['gradeId']})}"
                                        class="text-decoration-none text-muted">Lớp học</a></li>
                                <li class="breadcrumb-item active text-primary" aria-current="page"
                                    th:text="${classroom.id == null ? 'Thêm mới' : 'Cập nhật'}">Thêm mới</li>
                            </ol>
                        </nav>
                        <h2 class="fw-black text-dark tracking-tight mb-1"
                            th:text="${classroom.id == null ? 'Thêm mới Lớp học' : 'Cập nhật Lớp học'}"></h2>
                        <p class="text-secondary small fw-medium mb-0">Quản lý thông tin định danh và danh sách học sinh
                        </p>
                    </div>
                </div>

                <div class="card form-card border-0 shadow-sm rounded-xl overflow-hidden">
                    <form id="classroomForm" method="post" th:action="@{/classrooms(gradeId=${params['gradeId']})}"
                        th:object="${classroom}">
                        <div class="form-body p-4 p-lg-5">
                            <div th:if="${errorMessage}"
                                class="alert alert-danger alert-dismissible fade show rounded-xl border-0 shadow-sm mb-4"
                                role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i><span class="fw-bold"
                                    th:text="${errorMessage}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"
                                    aria-label="Close"></button>
                            </div>

                            <input type="hidden" th:field="*{id}" />
                            <input type="hidden" name="gradeId" th:value="${params['gradeId']}" />

                            <div class="mb-5">
                                <label
                                    class="form-label fw-black text-dark fs-13 text-uppercase tracking-wider mb-2">Thông
                                    tin định danh</label>
                                <div class="row">
                                    <div class="col-md-7">
                                        <div class="input-group input-group-merge">
                                            <span class="input-group-text bg-light border-0 px-3 text-muted">
                                                <i class="fas fa-chalkboard"></i>
                                            </span>
                                            <input type="text"
                                                class="form-control bg-light border-0 ps-0 py-2.5 fs-15 fw-bold"
                                                th:field="*{name}" placeholder="Ví dụ: 10A1, 12 Tin..."
                                                required="required"
                                                th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" />
                                            <div class="invalid-feedback fw-bold mt-2" th:errors="*{name}"></div>
                                        </div>
                                        <div class="form-text text-muted small mt-2">Tên lớp học nên bao gồm cả khối và
                                            định danh lớp.</div>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-0">
                                <label
                                    class="form-label fw-black text-dark fs-13 text-uppercase tracking-wider mb-3 d-flex align-items-center gap-2">
                                    <i class="fas fa-user-graduate text-indigo"></i>
                                    Danh sách học sinh
                                </label>

                                <div class="dual-listbox-container p-4 border rounded-xl bg-white shadow-none">
                                    <div class="row g-4 align-items-stretch">
                                        <div class="col-md-5 d-flex flex-column">
                                            <label class="form-label small fw-bold text-muted mb-2">Học sinh chưa có
                                                lớp</label>
                                            <div class="input-group input-group-merge mb-3 shadow-none">
                                                <span class="input-group-text bg-light border-0 px-3 text-muted">
                                                    <i class="fas fa-search fs-12"></i>
                                                </span>
                                                <input type="text" id="searchAvailable"
                                                    class="form-control bg-light border-0 ps-0 py-2 fs-13"
                                                    placeholder="Tên hoặc mã số...">
                                            </div>
                                            <select id="listAvailable" multiple
                                                class="form-select custom-select-box border rounded-3 p-2 grow"
                                                style="min-height: 300px;"></select>
                                            <div class="small fw-bold text-indigo mt-2" id="loadingText"
                                                style="display: none;">
                                                <i class="fas fa-circle-notch fa-spin me-1"></i> Đang tải...
                                            </div>
                                        </div>

                                        <div
                                            class="col-md-2 d-flex flex-column align-items-center justify-content-center gap-2 px-0">
                                            <button type="button" id="btnMoveRight"
                                                class="btn btn-indigo-soft text-indigo btn-sm w-75 rounded-pill hover-translate-y"
                                                title="Thêm học sinh">
                                                <i class="fas fa-chevron-right"></i>
                                            </button>
                                            <button type="button" id="btnMoveAllRight"
                                                class="btn btn-indigo-soft text-indigo btn-sm w-75 rounded-pill hover-translate-y"
                                                title="Thêm tất cả">
                                                <i class="fas fa-angles-right"></i>
                                            </button>
                                            <div class="my-2 border-top w-50 opacity-25"></div>
                                            <button type="button" id="btnMoveLeft"
                                                class="btn btn-danger-soft text-danger btn-sm w-75 rounded-pill hover-translate-y"
                                                title="Gỡ học sinh">
                                                <i class="fas fa-chevron-left"></i>
                                            </button>
                                            <button type="button" id="btnMoveAllLeft"
                                                class="btn btn-danger-soft text-danger btn-sm w-75 rounded-pill hover-translate-y"
                                                title="Gỡ tất cả">
                                                <i class="fas fa-angles-left"></i>
                                            </button>
                                        </div>

                                        <div class="col-md-5 d-flex flex-column">
                                            <label class="form-label small fw-black text-indigo mb-2">
                                                Học sinh đã chọn (<span id="selectedCount">0</span>)
                                            </label>
                                            <div class="input-group input-group-merge mb-3">
                                                <span class="input-group-text bg-indigo-soft border-0 px-3 text-indigo">
                                                    <i class="fas fa-filter fs-12"></i>
                                                </span>
                                                <input type="text" id="filterSelected"
                                                    class="form-control bg-indigo-soft border-0 ps-0 py-2 fs-13"
                                                    placeholder="Lọc trong danh sách...">
                                            </div>

                                            <select id="studentIds" multiple
                                                class="form-select custom-select-box border border-indigo-soft rounded-3 p-2 grow"
                                                name="studentIds"
                                                th:classappend="${#fields.hasErrors('studentIds')} ? 'is-invalid'">
                                                <th:block th:if="${selectedStudents != null}">
                                                    <option th:each="s : ${selectedStudents}" th:value="${s.id}"
                                                        th:text="${s.code + ' - ' + s.lastName + ' ' + s.firstName}">
                                                    </option>
                                                </th:block>
                                            </select>
                                            <div class="invalid-feedback fw-bold mt-2" th:errors="*{studentIds}"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div
                            class="form-footer bg-light p-4 p-lg-5 border-top d-flex justify-content-end gap-3 rounded-bottom-xl">
                            <a th:href="@{/classrooms(gradeId=${params['gradeId']})}"
                                class="btn btn-white border px-4 py-2.5 rounded-xl fw-bold text-muted hover-translate-y">Hủy
                                bỏ</a>
                            <button type="submit"
                                class="btn btn-primary px-5 py-2.5 rounded-xl fw-black shadow-primary hover-translate-y">
                                <i class="fas fa-save me-2 opacity-50"></i> Lưu lớp học
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <p th:replace="~{base :: footer}"></p>
    <script th:src="@{/js/classroom/classroom.js}"></script>
</body>

</html>
