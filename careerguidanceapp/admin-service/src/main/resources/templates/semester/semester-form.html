<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title th:text="${semester.id == null ? 'Thêm học kỳ mới' : 'Cập nhật học kỳ'}"></title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="mb-4">
                <a th:href="@{/years/{id}/semesters(id=${yearDisplay.id})}" class="text-decoration-none text-muted small mb-2 d-inline-block">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại danh sách
                </a>
                <h3 class="fw-bold text-dark" th:text="${semester.id == null ? 'Thêm Học kỳ mới' : 'Cập nhật Học kỳ'}"></h3>
            </div>

            <form method="post" th:action="@{/semesters}" th:object="${semester}"
                  class="form-card needs-validation" novalidate>

                <div class="form-body">

                    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-4 p-2 small" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <div class="mb-4 pb-3 border-bottom">
                        <label class="form-label text-muted small text-uppercase">Thuộc Niên khóa</label>
                        <div class="d-flex align-items-center">
                            <i class="far fa-calendar-alt me-2 text-primary"></i>
                            <span class="fw-bold fs-5 text-dark" th:text="${yearDisplay.name}">2024-2025</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Tên học kỳ <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0"
                                  th:classappend="${#fields.hasErrors('name')} ? 'border-danger text-danger bg-white'">
                                <i class="fas fa-layer-group"></i>
                            </span>

                            <select class="form-select border-start-0 ps-2" id="name" th:field="*{name}"
                                    th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                                <option value="" disabled selected>-- Chọn học kỳ --</option>
                                <option value="First semester">Học kỳ 1 (First semester)</option>
                                <option value="Second semester">Học kỳ 2 (Second semester)</option>
                            </select>

                            <div class="invalid-feedback ms-2" th:errors="*{name}"></div>
                        </div>
                    </div>

                </div>

                <div class="form-footer">
                    <input type="hidden" th:field="*{id}"/>
                    <input type="hidden" th:field="*{yearId}"/>

                    <a th:href="@{/years/{id}/semesters(id=${yearDisplay.id})}" class="btn btn-light text-muted border me-2">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">
                        <i class="fas fa-save me-1"></i> Lưu lại
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<p th:replace="~{base :: footer}"></p>

</body>
</html>
