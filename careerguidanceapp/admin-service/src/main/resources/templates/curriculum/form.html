<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Thông tin Nội khóa | Scholar Admin</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}" />
    <link rel="stylesheet" th:href="@{/css/curriculum/curriculum-form.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></    <main class="flex-grow-1 container py-5">
        <div class="row g-4">
            <div class="col-lg-3 col-md-4">
                <div th:replace="~{fragments/sidebar :: grade-sidebar(baseUrl='/curriculums')}"></div>
            </div>

            <div class="col-lg-9 col-md-8">
                <div class="page-header mb-4">
                    <nav aria-label="breadcrumb" class="mb-2 text-muted small fw-bold">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-muted">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/curriculums(gradeId=${params['gradeId']})}" class="text-decoration-none text-muted">Nội khóa</a></li>
                            <li class="breadcrumb-item active text-primary" aria-current="page" th:text="${curriculum.id == null ? 'Thêm mới' : 'Cập nhật'}">Thêm mới</li>
                        </ol>
                    </nav>
                    <h2 class="fw-black text-dark tracking-tight mb-1" th:text="${curriculum.id == null ? 'Thiết lập Nội khóa mới' : 'Cập nhật Nội khóa'}"></h2>
                    <p class="text-secondary small fw-medium mb-0">Phân bổ môn học cho khối và học kỳ tương ứng</p>
                </div>

                <div class="card form-card border-0 shadow-sm rounded-xl overflow-hidden">
                    <form th:action="@{/curriculums(gradeId=${params['gradeId']})}" th:object="${curriculum}" method="post">
                        <div class="form-body p-4 p-lg-5">
                            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-xl border-0 shadow-sm mb-4" role="alert">
                                <i class="fas fa-exclamation-triangle me-2"></i><span class="fw-bold" th:text="${errorMessage}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>

                            <input type="hidden" th:field="*{id}"/>
                            <input type="hidden" id="hiddenGradeId" name="gradeId"
                                   th:value="${params['gradeId'] != null ? params['gradeId'] : curriculum.gradeId}"/>

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-dark">Môn học áp dụng <span class="text-danger">*</span></label>
                                    <div class="input-group input-group-merge">
                                        <span class="input-group-text bg-light border-0 px-3 text-muted">
                                            <i class="fa-solid fa-book-bookmark"></i>
                                        </span>
                                        <select th:field="*{subjectId}" class="form-select bg-light border-0 ps-0 py-2.5 fs-15 fw-bold"
                                                th:classappend="${#fields.hasErrors('subjectId')} ? 'is-invalid'">
                                            <option value="">-- Chọn Môn học --</option>
                                            <option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.name}">Toán học</option>
                                        </select>
                                        <div class="invalid-feedback fw-bold mt-2" th:if="${#fields.hasErrors('subjectId')}" th:errors="*{subjectId}"></div>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-dark">Học kỳ đào tạo <span class="text-danger">*</span></label>
                                    <div class="input-group input-group-merge">
                                        <span class="input-group-text bg-light border-0 px-3 text-muted">
                                            <i class="fa-solid fa-calendar-week"></i>
                                        </span>
                                        <select th:field="*{semesterId}" class="form-select bg-light border-0 ps-0 py-2.5 fs-15 fw-bold"
                                                th:classappend="${#fields.hasErrors('semesterId')} ? 'is-invalid'">
                                            <option value="">-- Chọn Học kỳ --</option>
                                            <option th:each="s : ${semesters}" th:value="${s.id}" th:text="${s.name}">Học kỳ 1</option>
                                        </select>
                                        <div class="invalid-feedback fw-bold mt-2" th:if="${#fields.hasErrors('semesterId')}" th:errors="*{semesterId}"></div>
                                    </div>
                                    <div th:if="${#lists.isEmpty(semesters)}" class="alert alert-warning border-0 mt-3 small rounded-xl py-2 px-3 d-flex align-items-center bg-warning-soft">
                                        <i class="fa-solid fa-circle-info me-2 text-warning"></i>
                                        <span class="fw-bold text-warning">Chưa có học kỳ nào được tạo cho niên khóa này.</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-footer bg-light p-4 p-lg-5 border-top d-flex justify-content-end gap-3 rounded-bottom-xl">
                            <a th:href="@{/curriculums(gradeId=${params['gradeId']})}" class="btn btn-white border px-4 py-2.5 rounded-xl fw-bold text-muted hover-translate-y">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary px-5 py-2.5 rounded-xl fw-black shadow-primary hover-translate-y">
                                <i class="fa-solid fa-floppy-disk me-2 opacity-50"></i> Thiết lập nội khóa
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
           </div>
            </div>
        </div>
    </div>
</main>

<p th:replace="~{base :: footer}"></p>

</body>
</html>
