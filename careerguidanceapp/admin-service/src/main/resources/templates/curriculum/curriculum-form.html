<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Thông tin Chương trình đào tạo</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}" />
    <link rel="stylesheet" th:href="@{/css/curriculum/curriculum-form.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">
    <div class="row g-4">

        <div class="col-lg-3 col-md-4">
            <div th:replace="~{fragments/sidebar :: grade-sidebar(baseUrl='/curriculums')}"></div>
        </div>

        <div class="col-lg-9 col-md-8">
            <div class="card form-card">

                <div class="form-header">
                    <h5 class="form-title">
                        <i class="fas" th:classappend="${curriculum.id == null} ? 'fa-plus-circle' : 'fa-edit'"></i>
                        <span th:text="${curriculum.id == null ? 'Thêm mới Chương trình đào tạo' : 'Cập nhật Chương trình đào tạo'}"></span>
                    </h5>
                    <a th:href="@{/curriculums(gradeId=${params['gradeId']})}" class="btn btn-light border text-muted btn-sm">
                        <i class="fas fa-times me-1"></i> Đóng
                    </a>
                </div>

                <div class="card-body p-4">

                    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <div th:text="${errorMessage}">Error message</div>
                    </div>

                    <form th:action="@{/curriculums(gradeId=${params['gradeId']})}" th:object="${curriculum}" method="post">

                        <input type="hidden" th:field="*{id}"/>

                        <input type="hidden" id="hiddenGradeId" name="gradeId"
                               th:value="${params['gradeId'] != null ? params['gradeId'] : curriculum.gradeId}"/>

                        <div class="row g-4">

                            <div class="col-md-6">
                                <label class="form-label">Môn học <span class="required-star">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"
                                          th:classappend="${#fields.hasErrors('subjectId')} ? 'border-danger text-danger bg-white'">
                                        <i class="fas fa-book-open"></i>
                                    </span>
                                    <select th:field="*{subjectId}" class="form-select border-start-0 ps-2"
                                            th:classappend="${#fields.hasErrors('subjectId')} ? 'is-invalid'">
                                        <option value="">-- Chọn Môn học --</option>
                                        <option th:each="s : ${subjects}"
                                                th:value="${s.id}"
                                                th:text="${s.name}">Toán học</option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('subjectId')}" th:errors="*{subjectId}"></div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Học kỳ <span class="required-star">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"
                                          th:classappend="${#fields.hasErrors('semesterId')} ? 'border-danger text-danger bg-white'">
                                        <i class="fas fa-clock"></i>
                                    </span>
                                    <select th:field="*{semesterId}" class="form-select border-start-0 ps-2"
                                            th:classappend="${#fields.hasErrors('semesterId')} ? 'is-invalid'">
                                        <option value="">-- Chọn Học kỳ --</option>
                                        <option th:each="s : ${semesters}"
                                                th:value="${s.id}"
                                                th:text="${s.name}">Học kỳ 1</option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('semesterId')}" th:errors="*{semesterId}"></div>
                                </div>
                                <div th:if="${#lists.isEmpty(semesters)}" class="text-warning small mt-1">
                                    <i class="fas fa-exclamation-circle me-1"></i>Không tìm thấy học kỳ (Vui lòng kiểm tra lại cấu hình năm học).
                                </div>
                            </div>

                        </div>

                        <div class="mt-5 d-flex justify-content-end gap-2">
                            <a th:href="@{/curriculums(gradeId=${params['gradeId']})}" class="btn btn-light border">
                                Hủy bỏ
                            </a>
                            <button type="submit" class="btn btn-primary px-4" style="background-color: #2F54EB; border-color: #2F54EB;">
                                <i class="fas fa-save me-2"></i> Lưu lại
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<p th:replace="~{base :: footer}"></p>

</body>
</html>
