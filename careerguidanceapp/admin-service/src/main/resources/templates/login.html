<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Đăng nhập | Scholar Admin</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body class="login-page">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                <div class="card login-card animate-fadeInUp">
                    <div class="login-header">
                        <div class="logo-box">
                            <i class="fa-solid fa-graduation-cap"></i>
                        </div>
                        <h1 class="brand-name">Scholar</h1>
                        <p class="text-secondary small fw-medium">Hệ thống Quản trị</p>
                    </div>
                    <div class="login-body">
                        <form th:action="@{/login}" method="post">
                            <div th:if="${param.error}" class="error-alert text-start">
                                <i class="fa-solid fa-exclamation-circle"></i>
                                <span>Email hoặc mật khẩu không đúng!</span>
                            </div>

                            <div class="form-floating mb-3 text-start">
                                <input class="form-control" id="inputEmail" type="email" name="username"
                                    placeholder="name@example.com" required />
                                <label for="inputEmail" class="text-muted"><i
                                        class="fa-regular fa-envelope me-2"></i>Email</label>
                            </div>

                            <div class="form-floating mb-4 text-start">
                                <input class="form-control" id="inputPassword" type="password" name="password"
                                    placeholder="Mật khẩu" required />
                                <label for="inputPassword" class="text-muted"><i class="fa-solid fa-lock me-2"></i>Mật
                                    khẩu</label>
                            </div>

                            <button class="btn btn-primary btn-login w-100 py-3 mb-2" type="submit">
                                Đăng nhập
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <p class="text-white-50 small">
                        &copy; 2026 Career Guidance System. Bảo lưu mọi quyền.
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
