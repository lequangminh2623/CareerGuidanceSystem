<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Nhập điểm Môn học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}" />
    <link rel="stylesheet" th:href="@{/css/transcript/transcript-form.css}" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">

    <div class="mb-3">
        <a th:href="@{/classrooms/{id}/sections(id=${section.classroomId}, gradeId=${params['gradeId']})}" class="text-decoration-none text-muted fw-medium">
            <i class="fas fa-arrow-left me-2"></i>Quay lại danh sách lớp
        </a>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger shadow-sm border-0" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/transcripts/{id}(id=${section.id}, gradeId=${params['gradeId']}, classroomId=${section.classroomId})}" method="post">

        <div class="transcript-header shadow-sm">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h3 class="fw-bold mb-3">
                        <i class="fas fa-file-signature me-2"></i>Bảng điểm: <span th:text="${section.subjectName}">Toán Học</span>
                    </h3>
                    <div class="d-flex gap-3 flex-wrap">
                        <div class="info-pill"><i class="fas fa-chalkboard-teacher me-2"></i> Lớp: <span th:text="${section.classroomName}" class="ms-1 fw-bold">10A1</span></div>
                        <div class="info-pill"><i class="fas fa-layer-group me-2"></i><span th:text="${section.gradeName}">Grade 10</span></div>
                        <div class="info-pill"><i class="fas fa-user me-2"></i> GV: <span th:text="${section.teacherName}" class="ms-1 fw-bold">Nguyễn Văn A</span></div>
                        <div class="info-pill"><i class="fas fa-clock me-2"></i> <span th:text="${section.semesterName + ' (' + section.yearName + ')'}">Học kỳ 1</span></div>
                        <div class="info-pill bg-white text-primary fw-bold d-flex align-items-center">
                            <i class="fas fa-check-circle me-1"></i>
                            <select id="transcriptStatus" class="form-select form-select-sm border-0 fw-bold text-primary bg-transparent py-0"
                                    th:data-section-id="${section.id}"
                                    th:data-current-status="${section.scoreStatus}"
                                    onchange="changeTranscriptStatus(this)">
                                <option value="Draft" th:selected="${section.scoreStatus == 'Draft'}">Draft</option>
                                <option value="Locked" th:selected="${section.scoreStatus == 'Locked'}">Locked</option>
                            </select>
                        </div>                    </div>
                </div>
                <button type="submit" class="btn btn-light text-primary fw-bold shadow-sm px-4">
                    <i class="fas fa-save me-2"></i> Lưu Bảng Điểm
                </button>
            </div>
        </div>

        <div class="card table-card">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th class="text-center" style="width: 60px;">STT</th>
                        <th style="width: 120px;">Mã HS</th>
                        <th>Họ và Tên</th>
                        <th class="text-center" style="min-width: 200px;">
                            <div class="mb-1">Điểm Thường Xuyên</div>
                            <div id="extra-header-buttons" class="d-flex gap-2 justify-content-center align-items-center">
                                <button type="button" class="btn-add-col" onclick="addExtraColumn()" title="Thêm cột điểm bổ sung">
                                    <i class="fas fa-plus"></i> Thêm
                                </button>

                                <th:block th:if="${scores != null and not #lists.isEmpty(scores) and scores[0].extraScores != null}">
                                    <i class="fas fa-times-circle btn-remove-col"
                                       th:each="eg, iStat : ${scores[0].extraScores}"
                                       th:attr="onclick=|removeExtraColumn(${iStat.index})|"
                                       th:title="'Xóa cột ' + (${iStat.index} + 1)"></i>
                                </th:block>
                            </div>
                        </th>
                        <th class="text-center" style="width: 120px;">Điểm<br>Giữa Kỳ</th>
                        <th class="text-center" style="width: 120px;">Điểm<br>Cuối Kỳ</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr th:each="score, stat : ${scores}" th:with="st=${students.get(score.studentId)}">

                        <input type="hidden" th:name="|scores[${stat.index}].studentId|" th:value="${score.studentId}" />

                        <td class="text-center text-muted fw-medium" th:text="${stat.index + 1}">1</td>
                        <td class="fw-semibold text-dark"><span th:text="${st != null ? st.code : 'N/A'}">HS001</span></td>
                        <td class="fw-medium"><span th:text="${st != null ? (st.lastName + ' ' + st.firstName) : 'N/A'}">Nguyễn Văn A</span></td>

                        <td class="text-center bg-light bg-opacity-50">
                            <div class="extra-score-cells d-flex gap-2 justify-content-center" th:data-index="${stat.index}">
                                <input type="number" class="form-control score-input"
                                       th:each="ex, iStat : ${score.extraScores}"
                                       th:name="|scores[${stat.index}].extraScores[${iStat.index}]|"
                                       step="0.1" min="0" max="10" th:value="${ex}" />
                            </div>
                        </td>

                        <td class="text-center bg-primary bg-opacity-10">
                            <input type="number" class="form-control score-input mx-auto"
                                   th:name="|scores[${stat.index}].midtermScore|"
                                   step="0.1" min="0" max="10" th:value="${score.midtermScore}" />
                        </td>

                        <td class="text-center bg-info bg-opacity-10">
                            <input type="number" class="form-control score-input mx-auto"
                                   th:name="|scores[${stat.index}].finalScore|"
                                   step="0.1" min="0" max="10" th:value="${score.finalScore}" />
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(scores)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="fas fa-user-graduate mb-3" style="font-size: 32px; opacity: 0.5;"></i>
                            <p class="mb-0">Lớp học này chưa có học sinh nào. Vui lòng phân công học sinh vào lớp trước.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </form>
</main>

<p th:replace="~{base :: footer}"></p>

<script th:src="@{/js/transcript/transcript.js}"></script>

</body>
</html>
