<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <title>Nhập điểm Môn học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}" />
    <link rel="stylesheet" th:href="@{/css/transcript/transcript-form.css}" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
    <p th:replace="~{base :: header}"></p>

    <main class="flex-grow-1 container py-4">
        <div class="page-header mb-4 mt-2">
            <nav aria-label="breadcrumb" class="mb-2 text-muted small fw-bold">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none text-muted">Dashboard</a>
                    </li>
                    <li class="breadcrumb-item"><a
                            th:href="@{/classrooms/{id}/sections(id=${section.classroomId}, gradeId=${params['gradeId']})}"
                            class="text-decoration-none text-muted">Lớp học</a></li>
                    <li class="breadcrumb-item active text-primary" aria-current="page">Bảng điểm</li>
                </ol>
            </nav>
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-black text-dark tracking-tight mb-1">
                        Ghi điểm: <span class="text-indigo" th:text="${section.subjectName}">Toán Học</span>
                    </h2>
                    <div class="d-flex gap-3 mt-1">
                        <span class="text-secondary small fw-medium">
                            <i class="fas fa-chalkboard-teacher me-1"></i> Lớp <span class="fw-bold"
                                th:text="${section.classroomName}">10A1</span>
                        </span>
                        <span class="text-secondary small fw-medium">
                            <i class="fas fa-user-tie me-1"></i> GV <span class="fw-bold"
                                th:text="${section.teacherName}">GV. A</span>
                        </span>
                        <span class="text-secondary small fw-medium">
                            <i class="fas fa-clock me-1"></i> <span
                                th:text="${section.semesterName + ' (' + section.yearName + ')'}">HK1</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 rounded-xl mb-4" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i><span class="fw-bold" th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form
            th:action="@{/transcripts/{id}(id=${section.id}, gradeId=${params['gradeId']}, classroomId=${section.classroomId})}"
            method="post">
            <div class="card border-0 shadow-sm rounded-xl overflow-hidden mb-5">
                <div class="card-header bg-white border-bottom p-4 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <div class="info-pill bg-indigo-light rounded-pill border border-indigo-subtle d-flex align-items-center px-3 py-1 shadow-sm"
                             style="background-color: #f0f3ff; border: 1px solid #c5cfff; width: fit-content;">

                            <div class="d-flex align-items-center me-2 border-end border-indigo-subtle pe-2 text-indigo">
                                <i class="fas fa-shield-alt fs-13 me-2"></i>
                                <span class="fs-11 fw-bolder text-uppercase tracking-wider" style="white-space: nowrap;">Trạng thái</span>
                            </div>

                            <select id="transcriptStatus"
                                    class="form-select form-select-sm border-0 fw-bold text-indigo bg-transparent shadow-none p-0 fs-13"
                                    th:data-section-id="${section.id}"
                                    th:data-current-status="${section.scoreStatus}"
                                    onchange="changeTranscriptStatus(this)"
                                    style="width: auto; cursor: pointer; min-width: 140px; color: #4e59ff;">

                                <option value="Draft" th:selected="${section.scoreStatus == 'Draft'}" class="bg-white text-dark">
                                    BẢN NHÁP
                                </option>
                                <option value="Locked" th:selected="${section.scoreStatus == 'Locked'}" class="bg-white text-dark">
                                    ĐÃ KHÓA
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-3">
                        <a th:href="@{/classrooms/{id}/sections(id=${section.classroomId}, gradeId=${params['gradeId']})}"
                            class="btn btn-white border px-4 py-2.5 rounded-xl fw-bold text-muted hover-translate-y">Hủy
                            bỏ</a>
                        <button type="submit"
                            class="btn btn-primary px-5 py-2.5 rounded-xl fw-black shadow-primary hover-translate-y">
                            <i class="fas fa-save me-2 opacity-50"></i> Lưu bảng điểm
                        </button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="bg-light border-bottom">
                            <tr>
                                <th class="text-center py-3" style="width: 70px;">STT</th>
                                <th class="py-3" style="width: 150px;">Mã Học Sinh</th>
                                <th class="py-3">Họ và Tên Học Sinh</th>
                                <th class="text-center py-3" style="min-width: 250px;">
                                    <div class="fw-black text-dark fs-12 uppercase tracking-wider mb-2">Điểm Thường
                                        Xuyên</div>
                                    <div id="extra-header-buttons"
                                        class="d-flex gap-2 justify-content-center align-items-center">
                                        <button type="button"
                                            class="btn btn-indigo-soft btn-xs rounded-pill px-3 py-1 fw-bold fs-10"
                                            onclick="addExtraColumn()">
                                            <i class="fas fa-plus me-1"></i> THÊM CỘT
                                        </button>
                                        <th:block
                                            th:if="${scores != null and not #lists.isEmpty(scores) and scores[0].extraScores != null}">
                                            <div class="d-flex gap-1">
                                                <button type="button" th:each="eg, iStat : ${scores[0].extraScores}"
                                                    class="btn btn-outline-danger btn-xs rounded-circle p-1 d-flex align-items-center justify-content-center"
                                                    th:attr="onclick=|removeExtraColumn(${iStat.index})|"
                                                    style="width: 20px; height: 20px;"
                                                    th:title="'Xóa cột ' + (${iStat.index} + 1)">
                                                    <i class="fas fa-times fs-8"></i>
                                                </button>
                                            </div>
                                        </th:block>
                                    </div>
                                </th>
                                <th class="text-center py-3" style="width: 130px;">
                                    <div class="fw-bold text-dark fs-11 uppercase tracking-wider mb-1">Giữa Kỳ</div>
                                    <span class="badge bg-indigo-soft text-indigo rounded-pill px-2 fs-9">HS x 2</span>
                                </th>
                                <th class="text-center py-3" style="width: 130px;">
                                    <div class="fw-bold text-dark fs-11 uppercase tracking-wider mb-1">Cuối Kỳ</div>
                                    <span class="badge bg-indigo-soft text-indigo rounded-pill px-2 fs-9">HS x 3</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="score, stat : ${scores}" th:with="st=${students.get(score.studentId)}">
                                <input type="hidden" th:name="|scores[${stat.index}].studentId|"
                                    th:value="${score.studentId}" />

                                <td class="text-center text-secondary fw-bold" th:text="${stat.index + 1}">1</td>
                                <td>
                                    <span
                                        class="badge bg-light text-secondary border fw-bold px-3 py-2 rounded-pill fs-12 font-monospace"
                                        th:text="${st != null ? st.code : 'N/A'}">HS001</span>
                                </td>
                                <td class="fw-bold text-dark">
                                    <span th:text="${st != null ? (st.lastName + ' ' + st.firstName) : 'N/A'}">Nguyễn
                                        Văn A</span>
                                </td>

                                <td class="bg-indigo-soft bg-opacity-30">
                                    <div class="extra-score-cells d-flex gap-2 justify-content-center"
                                        th:data-index="${stat.index}">
                                        <input type="number" class="form-control score-box text-center fw-black"
                                            th:each="ex, iStat : ${score.extraScores}"
                                            th:name="|scores[${stat.index}].extraScores[${iStat.index}]|" step="0.1"
                                            min="0" max="10" th:value="${ex}" placeholder="-" />
                                    </div>
                                </td>

                                <td class="text-center border-start">
                                    <input type="number"
                                        class="form-control score-box-lg mx-auto text-center fw-black text-indigo bg-light border-0 shadow-none fs-16"
                                        th:name="|scores[${stat.index}].midtermScore|" step="0.1" min="0" max="10"
                                        th:value="${score.midtermScore}" placeholder="-" />
                                </td>

                                <td class="text-center border-start border-end">
                                    <input type="number"
                                        class="form-control score-box-lg mx-auto text-center fw-black text-primary bg-light border-0 shadow-none fs-16"
                                        th:name="|scores[${stat.index}].finalScore|" step="0.1" min="0" max="10"
                                        th:value="${score.finalScore}" placeholder="-" />
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(scores)}">
                                <td colspan="6" class="text-center py-5">
                                    <div class="py-4 opacity-50">
                                        <i class="fas fa-user-graduate fs-2 mb-3"></i>
                                        <p class="mb-1 fw-bold">Chưa có danh sách học sinh.</p>
                                        <p class="text-muted small">Vui lòng phân công học sinh vào lớp trước khi nhập
                                            điểm.</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </form>
    </main>

    <p th:replace="~{base :: footer}"></p>
    <th:block th:replace="~{base :: scripts}"></th:block>
    <script th:src="@{/js/transcript/transcript.js}"></script>

</body>

</html>
