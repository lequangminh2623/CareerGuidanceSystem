<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Quản lý Năm học</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}" />
    <link rel="stylesheet" th:href="@{/css/year/year-list.css}" />
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">

    <div class="page-header">
        <div>
            <h4 class="fw-bold mb-1">Quản lý Niên khóa</h4>
            <span class="text-muted small">Thiết lập năm học và cấu trúc chương trình</span>
        </div>
    </div>

    <div class="filter-bar">
        <form th:action="@{/years}" method="get" class="d-flex align-items-center flex-grow-1 me-3">
            <div class="input-group" style="max-width: 400px;">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-search"></i></span>
                <input type="text" name="kw" class="form-control border-start-0 ps-0"
                       placeholder="Tìm kiếm năm học..."
                       th:value="${params['kw']}"/>
                <button type="submit" class="btn btn-outline-primary border-start-0" style="border-color: #d9d9d9; color: #1890FF;">Lọc</button>
            </div>
        </form>

        <a th:href="@{/years/add}" class="btn btn-primary shadow-sm px-3">
            <i class="fas fa-plus me-2"></i> Thêm năm học
        </a>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th class="ps-4 text-start">Năm học</th>
                    <th>Cấu hình liên quan</th>
                    <th class="text-end pe-4">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="y : ${years.content}">
                    <td class="ps-4">
                        <div class="year-box">
                            <i class="far fa-calendar-alt year-icon"></i>
                            <span class="year-text" th:text="${y.name}">2025-2026</span>
                        </div>
                    </td>

                    <td>
                        <a th:href="@{'/years/' + ${y.id} + '/semesters'}" class="link-badge semester" title="Quản lý học kỳ">
                            <i class="fas fa-clock me-2"></i>Học kỳ
                        </a>
                        <a th:href="@{'/years/' + ${y.id} + '/grades'}" class="link-badge grade" title="Quản lý khối lớp">
                            <i class="fas fa-layer-group me-2"></i>Khối lớp
                        </a>
                    </td>

                    <td class="text-end pe-4">
                        <a th:href="@{'/years/' + ${y.id}}" class="btn-icon" title="Chỉnh sửa">
                            <i class="fas fa-pen" style="font-size: 14px;"></i>
                        </a>
                        <button class="btn-icon delete"
                                th:data-url="@{/years/}"
                                th:data-id="${y.id}"
                                onclick="deleteHandler(this)"
                                title="Xóa">
                            <i class="fas fa-trash" style="font-size: 14px;"></i>
                        </button>
                    </td>
                </tr>

                <tr th:if="${years.totalElements == 0}">
                    <td colspan="3" class="text-center py-5">
                        <div class="text-muted">
                            <i class="far fa-calendar-times mb-3" style="font-size: 24px; opacity: 0.5;"></i>
                            <p class="mb-0">Chưa có dữ liệu năm học nào.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/pagination :: pagination(pageData=${years})}"></div>
    </div>

</main>

<p th:replace="~{base :: footer}"></p>
<script th:src="@{/js/delete.js}"></script>

</body>
</html>
