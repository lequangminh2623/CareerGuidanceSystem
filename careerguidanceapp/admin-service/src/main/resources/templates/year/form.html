<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <title th:text="${year.id == null ? 'Thêm năm học mới' : 'Cập nhật năm học'}"></title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}">
</head>

<body class="d-flex flex-column min-vh-100">

    <p th:replace="~{base :: header}"></p>

    <main class="grow container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="mb-4">
                    <nav aria-label="breadcrumb" class="mb-2 text-muted small fw-bold">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a th:href="@{/}"
                                    class="text-decoration-none text-muted">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/years}"
                                    class="text-decoration-none text-muted">Niên khóa</a></li>
                            <li class="breadcrumb-item active text-primary" aria-current="page"
                                th:text="${year.id == null ? 'Thêm mới' : 'Cập nhật'}">Thêm mới</li>
                        </ol>
                    </nav>
                    <h2 class="fw-black text-dark tracking-tight mb-1"
                        th:text="${year.id == null ? 'Thêm Niên khóa mới' : 'Cập nhật Niên khóa'}"></h2>
                </div>

                <form method="post" th:action="@{/years}" th:object="${year}"
                    class="form-card border-0 shadow-sm rounded-xl overflow-hidden needs-validation" novalidate>
                    <div class="form-body p-4 p-lg-5">
                        <div th:if="${errorMessage}"
                            class="alert alert-danger alert-dismissible fade show rounded-xl border-0 shadow-sm mb-4"
                            role="alert">
                            <i class="fas fa-exclamation-triangle me-2"></i><span class="fw-bold"
                                th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="mb-4">
                            <label for="name" class="form-label fw-bold text-dark">Tên niên khóa <span
                                    class="text-danger">*</span></label>
                            <div class="input-group input-group-merge">
                                <span class="input-group-text bg-light border-0 px-3 text-muted">
                                    <i class="far fa-calendar-alt"></i>
                                </span>
                                <input type="text" class="form-control bg-light border-0 ps-0 py-2.5 fs-15 fw-bold"
                                    id="name" th:field="*{name}" placeholder="VD: 2025-2026" autocomplete="off"
                                    required="required" pattern="^\d{4}-\d{4}$"
                                    th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" />
                                <div class="invalid-feedback fw-bold mt-2" th:errors="*{name}"></div>
                            </div>
                        </div>

                        <div class="helper-box bg-indigo-soft p-3 rounded-xl border-0">
                            <div class="d-flex">
                                <i class="fas fa-info-circle text-indigo me-3 mt-1 fs-5"></i>
                                <div>
                                    <strong class="text-indigo">Hướng dẫn định dạng</strong>
                                    <p class="text-indigo small mt-1 mb-0 opacity-75">Sử dụng định dạng
                                        <code>YYYY-YYYY</code> (Ví dụ: 2024-2025) để thống nhất với các báo cáo và phân
                                        tích học tập.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div
                        class="form-footer bg-light p-4 p-lg-5 border-top d-flex justify-content-end gap-3 rounded-bottom-xl">
                        <input type="hidden" th:field="*{id}" />
                        <a th:href="@{/years}"
                            class="btn btn-white border px-4 py-2.5 rounded-xl fw-bold text-muted hover-translate-y">Hủy
                            bỏ</a>
                        <button type="submit"
                            class="btn btn-primary px-5 py-2.5 rounded-xl fw-black shadow-primary hover-translate-y">
                            <i class="fas fa-save me-2 opacity-50"></i> Lưu lại
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <p th:replace="~{base :: footer}"></p>

</body>

</html>
