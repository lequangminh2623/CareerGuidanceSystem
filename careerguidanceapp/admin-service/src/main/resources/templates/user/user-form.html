<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title th:text="${user?.id == null ? 'Thêm người dùng mới' : 'Cập nhật hồ sơ'}"></title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/form-common.css}"/>
    <link rel="stylesheet" th:href="@{/css/user/user-form.css}">
</head>

<body class="d-flex flex-column min-vh-100">

<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">

            <div class="mb-4">
                <a th:href="@{/users}" class="text-decoration-none text-muted small mb-2 d-inline-block">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại danh sách
                </a>
                <h3 class="fw-bold text-dark"
                    th:text="${user?.id == null ? 'Thêm người dùng mới' : 'Cập nhật hồ sơ'}"></h3>
            </div>

            <form method="post" th:action="@{/users/save}" th:object="${user}"
                  enctype="multipart/form-data" class="form-card needs-validation" novalidate>

                <div class="form-body">

                    <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <div class="avatar-upload-container">
                        <img id="avatarPreview"
                             th:src="${user.avatar != null ? user.avatar : 'https://ui-avatars.com/api/?name=New+User&background=F0F2F5&color=8C8C8C'}"
                             class="avatar-preview" alt="Avatar Preview">

                        <div class="text-center">
                            <label for="fileInput" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-camera me-1"></i> Chọn ảnh
                            </label>
                            <input type="file" class="d-none" th:name="file" id="fileInput" accept="image/*"/>
                            <div class="text-muted small mt-2" style="font-size: 11px;">Hỗ trợ: JPG, PNG (Max 5MB)</div>
                        </div>
                    </div>

                    <hr class="border-light my-4">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Họ & Tên đệm <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="lastName" th:field="*{lastName}"
                                   placeholder="Nhập họ..."
                                   th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{lastName}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="firstName" class="form-label">Tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="firstName" th:field="*{firstName}"
                                   placeholder="Nhập tên..."
                                   th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{firstName}"></div>
                        </div>

                        <div class="col-12">
                            <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted border-end-0"
                                      th:classappend="${#fields.hasErrors('email')} ? 'border-danger text-danger bg-white'">
                                    <i class="far fa-envelope"></i>
                                </span>
                                <input type="email" class="form-control border-start-0 ps-0" id="email"
                                       th:field="*{email}"
                                       placeholder="example@ou.edu.vn"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                            </div>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                            <div class="helper-box">
                                <div class="d-flex">
                                    <i class="fas fa-info-circle text-primary me-2 mt-1"></i>
                                    <div>
                                        <strong>Lưu ý định dạng:</strong>
                                        <div class="mt-1">Bắt buộc sử dụng email tên miền trường (@ou.edu.vn).</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="role" class="form-label">Vai trò <span class="text-danger">*</span></label>
                            <select class="form-select" id="role" th:field="*{role}" required
                                    th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                                <option value="Student">Học sinh (Student)</option>
                                <option value="Teacher">Giáo viên (Teacher)</option>
                                <option value="Admin">Quản trị viên (Admin)</option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{role}"></div>
                        </div>

                        <div class="col-md-6">
                            <label for="gender" class="form-label">Giới tính</label>
                            <select id="gender" th:field="*{gender}" class="form-select">
                                <option th:value="true">Nam</option>
                                <option th:value="false">Nữ</option>
                            </select>
                        </div>
                    </div>

                    <div id="codeGroup" class="student-code-group mt-4" style="display: none;">
                        <label for="code" class="form-label fw-bold text-primary mb-1">
                            <i class="fas fa-id-card me-1"></i> Mã số học sinh
                        </label>
                        <input type="text" class="form-control" id="code" th:field="*{code}"
                               placeholder="Nhập mã số định danh (10 số)" maxlength="10"
                               th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{code}"></div>
                    </div>

                    <div class="mt-4">
                        <div class="switch-container">
                            <div>
                                <label class="form-check-label fw-bold d-block" for="active">Trạng thái hoạt
                                    động</label>
                                <small class="text-muted">Bật để cho phép người dùng đăng nhập hệ thống.</small>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="active"
                                       th:field="*{active}" style="width: 2.5em; height: 1.25em;">
                            </div>
                        </div>
                    </div>

                </div>

                <div class="form-footer">
                    <input type="hidden" th:field="*{id}"/>
                    <input type="hidden" th:field="*{avatar}"/>

                    <a th:href="@{/users}" class="btn btn-light text-muted border me-2">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary px-4 fw-bold">
                        <i class="fas fa-save me-1"></i> Lưu lại
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

<p th:replace="~{base :: footer}"></p>

<script th:src="@{/js/user/user.js}"></script>

</body>
</html>
