<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <title>Danh sách người dùng</title>
    <th:block th:replace="~{base :: bootstrap}"></th:block>
    <link rel="stylesheet" th:href="@{/css/list-common.css}"/>
    <link rel="stylesheet" th:href="@{/css/user/user-list.css}"/>
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<p th:replace="~{base :: header}"></p>

<main class="flex-grow-1 container py-4">

    <div class="page-header">
        <div>
            <h4 class="fw-bold mb-1">Quản lý Người dùng</h4>
            <span class="text-muted small">Quản lý danh sách, phân quyền và trạng thái tài khoản</span>
        </div>
    </div>

    <div class="filter-bar">
        <form th:action="@{/users}" method="get" class="d-flex align-items-center flex-grow-1 me-3">
            <div class="d-flex gap-2 w-100" style="max-width: 600px;">

                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-search"></i></span>
                    <input type="text" name="kw" class="form-control border-start-0 ps-0"
                           placeholder="Tìm theo tên hoặc mã học sinh..."
                           th:value="${params['kw']}"/>
                </div>

                <select name="role" class="form-select text-muted" style="font-size: 14px; max-width: 180px;">
                    <option value="" th:selected="${params['role'] == null || params['role'] == ''}">-- Tất cả vai trò --</option>
                    <option value="Admin" th:selected="${params['role'] == 'Admin'}">Quản trị viên</option>
                    <option value="Teacher" th:selected="${params['role'] == 'Teacher'}">Giáo viên</option>
                    <option value="Student" th:selected="${params['role'] == 'Student'}">Học sinh</option>
                </select>

                <button type="submit" class="btn btn-outline-primary"
                        style="border-color: #d9d9d9; color: #2F54EB; white-space: nowrap;">
                    <i class="fas fa-filter me-1"></i> Lọc
                </button>

                <a th:if="${(params['kw'] != null && params['kw'] != '') || (params['role'] != null && params['role'] != '')}"
                   th:href="@{/users}"
                   class="btn btn-light text-muted border"
                   title="Xóa bộ lọc">
                    <i class="fas fa-times"></i>
                </a>
            </div>
        </form>

        <a th:href="@{/users/add}" class="btn btn-primary shadow-sm px-3">
            <i class="fas fa-plus me-2"></i> Thêm người dùng
        </a>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Ảnh đại diện</th>
                    <th>Thông tin người dùng</th>
                    <th>Vai trò & Mã số</th>
                    <th>Giới tính</th>
                    <th>Trạng thái</th>
                    <th>Thời gian</th>
                    <th class="text-end">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users.content}">
                    <td>
                        <img th:src="${u.avatar != null ? u.avatar : 'https://ui-avatars.com/api/?name=' + u.firstName + '&background=random'}"
                             class="user-avatar" alt="Avatar">
                    </td>

                    <td>
                        <div class="fw-bold text-dark" th:text="${u.lastName + ' ' + u.firstName}">Nguyễn Văn A</div>
                        <div class="small text-muted" th:text="${u.email}">a@gmail.com</div>
                    </td>

                    <td>
                        <div class="mb-1">
                            <span class="badge-soft"
                                  th:classappend="${u.role == 'Admin' ? 'badge-soft-primary' :
                                                  (u.role == 'Teacher' ? 'badge-soft-warning' : 'badge-soft-secondary')}"
                                  th:text="${u.role == 'Admin' ? 'Quản trị viên' : (u.role == 'Teacher' ? 'Giáo viên' : 'Học sinh')}">
                            </span>
                        </div>
                        <div th:if="${u.code != null && u.code != ''}" class="user-code" title="Mã số định danh">
                            <i class="fas fa-hashtag me-1" style="font-size: 10px;"></i><span th:text="${u.code}"></span>
                        </div>
                    </td>

                    <td>
                        <div class="small text-muted">
                            <i class="fas fa-venus-mars me-1" style="width: 16px;"></i>
                            <span th:text="${u.gender ? 'Nam' : 'Nữ'}"></span>
                        </div>
                    </td>

                    <td>
                        <div class="d-flex align-items-center">
                            <span class="status-dot" th:classappend="${u.active ? 'status-active' : 'status-inactive'}"></span>
                            <span class="small fw-semibold"
                                  th:classappend="${u.active ? 'text-success' : 'text-muted'}"
                                  th:text="${u.active ? 'Hoạt động' : 'Đã khóa'}"></span>
                        </div>
                    </td>

                    <td class="small text-muted">
                        <div class="mb-1" title="Ngày tạo">
                            <i class="far fa-calendar-plus me-1 text-primary"></i>
                            <span th:text="${#temporals.format(u.createdDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                        <div title="Ngày cập nhật gần nhất">
                            <i class="far fa-edit me-1 text-warning"></i>
                            <span th:text="${#temporals.format(u.updatedDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                    </td>

                    <td class="text-end">
                        <a th:href="@{'/users/' + ${u.id}}" class="btn-icon" title="Chỉnh sửa">
                            <i class="fas fa-pen" style="font-size: 14px;"></i>
                        </a>
                        <button class="btn-icon delete"
                                th:data-url="@{/users/}"
                                th:data-id="${u.id}"
                                onclick="deleteHandler(this)"
                                title="Xóa">
                            <i class="fas fa-trash" style="font-size: 14px;"></i>
                        </button>
                    </td>
                </tr>

                <tr th:if="${users.totalElements == 0}">
                    <td colspan="7" class="text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-search mb-2" style="font-size: 24px; opacity: 0.5;"></i>
                            <p class="mb-0">Không tìm thấy người dùng nào phù hợp.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:replace="~{fragments/pagination :: pagination(pageData=${users})}"></div>
    </div>

</main>

<p th:replace="~{base :: footer}"></p>

<script th:src="@{/js/user/user.js}"></script>
<script th:src="@{/js/delete.js}"></script>

</body>
</html>
