<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" lang="vi">

<head>
    <title>Hệ thống Quản lý</title>

    <th:block th:fragment="bootstrap">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/base.css}">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    </th:block>
</head>

<body class="d-flex flex-column min-vh-100">

<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light navbar-custom">
        <div class="container">

            <a class="navbar-brand" th:href="@{/}">
                <div class="d-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded me-2" style="width: 32px; height: 32px;">
                    <i class="fas fa-graduation-cap text-primary" style="font-size: 16px;"></i>
                </div>
                <span>GradeSystem</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 pt-2 pt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"
                           th:classappend="${requestURI == contextPath + '/'} ? ' active'">
                            <i class="fas fa-chart-pie me-2"></i>Tổng quan
                        </a>
                    </li>

                    <th:block sec:authorize="isAuthenticated()">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/users}"
                               th:classappend="${requestURI.startsWith(contextPath + '/users')} ? ' active'">
                                <i class="fas fa-user-friends me-2"></i>Người dùng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/subjects}"
                               th:classappend="${requestURI.startsWith(contextPath + '/subjects')} ? ' active'">
                                <i class="fas fa-book-open me-2"></i>Môn học
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/years}"
                               th:classappend="${requestURI.startsWith(contextPath + '/years')} ? ' active'">
                                <i class="fas fa-calendar-check me-2"></i>Năm học
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/curriculums}"
                               th:classappend="${requestURI.startsWith(contextPath + '/curriculums')} ? ' active'">
                                <i class="fas fa-book-open-reader me-2"></i>Chương trình học
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/classrooms}"
                               th:classappend="${requestURI.startsWith(contextPath + '/classrooms')} ? ' active'">
                                <i class="fas fa-chalkboard-teacher me-2"></i>Lớp học
                            </a>
                        </li>
                    </th:block>
                </ul>

                <ul class="navbar-nav ms-auto" sec:authorize="isAuthenticated()">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=1890FF&color=fff" class="rounded-circle me-2" width="28" height="28" alt="Avatar">
                            <span sec:authentication="name">Tài khoản</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" style="font-size: 14px;">
                            <li><a class="dropdown-item py-2" href="#"><i class="far fa-id-card me-2 text-muted"></i> Hồ sơ cá nhân</a></li>
                            <li><a class="dropdown-item py-2" href="#"><i class="fas fa-cog me-2 text-muted"></i> Cài đặt</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <a class="dropdown-item text-danger py-2" th:href="@{/logout}">
                                    <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main class="flex-grow-1">
</main>

<footer th:fragment="footer" class="py-4 mt-auto bg-white">
    <div class="container px-4">
        <div class="d-flex flex-column flex-md-row align-items-center justify-content-between small text-secondary">
            <div class="mb-2 mb-md-0">
                <strong>Career Guidance System</strong> &copy; 2026
            </div>
            <div>
                <a href="#" class="text-decoration-none text-secondary me-3 hover-link">Bảo mật</a>
                <a href="#" class="text-decoration-none text-secondary hover-link">Điều khoản</a>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
