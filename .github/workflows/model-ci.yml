name: Model CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
    paths:
      - 'careerguidancemodel/**'
      - '.github/workflows/model-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'careerguidancemodel/**'
      - '.github/workflows/model-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./careerguidancemodel

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest testcontainers httpx pytest-asyncio mongomock fakeredis respx pytest-mock

    - name: Test with pytest
      run: |
        # Đặt các biến môi trường cần thiết cho test ở đây
        export REDIS_HOST=localhost
        export REDIS_PORT=6379
        export REDIS_PASSWORD=dummy
        PYTHONPATH=. python -m pytest
      continue-on-error: true # Tạm thời để true nếu chưa hoàn thiện bộ test
