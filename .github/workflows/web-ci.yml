name: Web CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ "main" ]
    paths:
      - 'careerguidanceweb/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'careerguidanceweb/**'
      - '.github/workflows/web-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./careerguidanceweb

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./careerguidanceweb/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint Code
      run: npm run lint
      continue-on-error: true # Đặt true nếu chưa fix hết lỗi lint

    - name: Build Next.js App
      run: npm run build
